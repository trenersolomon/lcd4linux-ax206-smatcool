Display dpf {
    Driver      'DPF'
    Port        'usb0'
    Font        '6x8'
    orientation 0
    backlight   7
    foreground  'ffffff'
    background  '000000'
    basecolor   '000000'
}

Variables {
    _bg     '000011'
    _title  '4488ff'
    _val    'aaccff'
    _green  '00aa00'
    _dkgreen '003300'
    _blue   '0055ff'
    _dkblue '001133'
    _warn   'ffaa00'
    _hot    'ff3300'
    _ram    '88ff88'
    _vram   '88aaff'
}

Widget CPU_title {
    class      'Truetype'
    expression 'CPU'
    font       '/usr/share/fonts/TTF/DejaVuSans-Bold.ttf'
    size       14
    width      60
    height     20
    fcolor     _title
    update     1000
}

Widget CPU_load {
    class      'Truetype'
    expression round(proc_stat::cpu('busy', 1)) . '%'
    font       '/usr/share/fonts/TTF/DejaVuSans-Bold.ttf'
    size       14
    width      80
    height     20
    fcolor     _val
    reload     1
    update     500
}

Widget CPU_temp {
    class      'Truetype'
    expression round(file::readline('/sys/class/hwmon/hwmon7/temp1_input', 1) / 1000) . '°'
    font       '/usr/share/fonts/TTF/DejaVuSans-Bold.ttf'
    fcolor     'ff8800'
    size       18
    width      50
    height     20
    reload     1
    update     1000
}

Widget RAM_free {
    class      'Truetype'
    expression round(meminfo('MemAvailable') / 1024/1024) . ' GB DDR5 free'
    font       '/usr/share/fonts/TTF/DejaVuSans-Bold.ttf'
    size       12
    width      150
    height     14
    fcolor     _val
    reload     1
    update     1000
}

Widget VRAM_free {
    class      'Truetype'
    expression round((file::readline('/sys/class/drm/card1/device/mem_info_vram_total', 1)-file::readline('/sys/class/drm/card1/device/mem_info_vram_used', 1)) / 1024/1024/1024) . ' GB VRAM free'
    font       '/usr/share/fonts/TTF/DejaVuSans-Bold.ttf'
    size       12
    width      150
    height     14
    fcolor     _val
    reload     1
    update     1000
}


Widget CPU_bar {
    class      'GraphicBar'
    expression proc_stat::cpu('busy', 1)
    min        0
    max        100
    length     240
    width      14
    direction  'E'
    color      _green
    background _dkgreen
    valuehigh  70
    colorhigh  _warn
    reload     1
    update     500
}

Widget GPU_title {
    class      'Truetype'
    expression 'GPU'
    font       '/usr/share/fonts/TTF/DejaVuSans-Bold.ttf'
    size       14
    width      50
    height     20
    fcolor     _title
    update     1000
}

Widget GPU_load {
    class      'Truetype'
    expression file::readline('/sys/class/drm/card1/device/gpu_busy_percent', 1) . '%'
    font       '/usr/share/fonts/TTF/DejaVuSans-Bold.ttf'
    size       14
    width      80
    height     20
    fcolor     _val
    reload     1
    update     500
}

Widget GPU_temp {
    class      'Truetype'
    expression round(file::readline('/sys/class/hwmon/hwmon4/temp1_input', 1) / 1000) . '°'
    font       '/usr/share/fonts/TTF/DejaVuSans-Bold.ttf'
    fcolor     'ff8800'
    size       18
    width      50
    height     20
    reload     1
    update     1000
}

Widget GPU_mem {
    class      'Truetype'
    expression round(file::readline('/sys/class/drm/card1/device/mem_info_vram_used', 1) / 1024 / 1024 / 1024) . ' GB used'
    font       '/usr/share/fonts/TTF/DejaVuSans-Bold.ttf'
    size       14
    width      150
    height     20
    fcolor     _val
    reload     1
    update     1000
}

Widget GPU_bar {
    class      'GraphicBar'
    expression file::readline('/sys/class/drm/card1/device/gpu_busy_percent', 1)
    min        0
    max        100
    length     240
    width      14
    direction  'E'
    color      _blue
    background _dkblue
    valuehigh  70
    colorhigh  _warn
    reload     1
    update     500
}

Widget BG {
    class   'Image'
    file    '/home/solomon/projects/LCD/cachyos_320x240.png'
    height  240
    width   320
    update  0
    reload  0
}


# RAM bar
Widget RAM_bar {
    class      'GraphicBar'
    expression (meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100
    min        0
    max        100
    length     180
    width      14
    direction  'E'
    color      _ram
    background _dkgreen
    valuehigh  85
    colorhigh  _warn
    reload     1
    update     1000
}


# VRAM bar
Widget VRAM_bar {
    class      'GraphicBar'
    expression round(file::readline('/sys/class/drm/card1/device/mem_info_vram_used', 1) / file::readline('/sys/class/drm/card1/device/mem_info_vram_total', 1) * 100)
#    expression file::readline('/sys/class/drm/card1/device/mem_info_vram_used', 1) / 1024 / 1024 / 20480 * 100
    min        0
    max        100
    length     180
    width      14
    direction  'E'
    color      _vram
    background _dkblue
    valuehigh  85
    colorhigh  _warn
    reload     1
    update     1000
}



Widget CPU_hist {
    class      'Histogram'
    expression proc_stat::cpu('busy', 1)
    min        0
    max        100
    length     180
    width      30
    color      '00aaff'
    background '001133'
    update     500
    reload     1
}





##################################################################

Widget CPU_freq {
    class      'Truetype'
    expression round(file::readline('/sys/devices/system/cpu/cpu0/cpufreq/scaling_cur_freq', 1) / 1000) . ' MHz'
    font       '/usr/share/fonts/TTF/DejaVuSans-Bold.ttf'
    size       12
    width      90
    height     18
    fcolor     'ffff00'
    reload     1
    update     1000
}

Widget GPU_freq {
    class      'Truetype'
    expression round(file::readline('/sys/class/drm/card1/device/hwmon/hwmon3/freq1_input', 1) / 1000000) . ' MHz'
    font       '/usr/share/fonts/TTF/DejaVuSans-Bold.ttf'
    size       12
    width      90
    height     18
    fcolor     'ffff00'
    reload     1
    update     1000
}

Widget GPU_hist {
    class      'Histogram'
    expression file::readline('/sys/class/drm/card1/device/gpu_busy_percent', 1)
    min        0
    max        100
    length     180
    width      25
    color      '0055ff'
    background '001133'
    update     500
    reload     1
}

Widget RAM_pct {
    class      'Truetype'
    expression round((meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100) . '%'
    font       '/usr/share/fonts/TTF/DejaVuSans-Bold.ttf'
    size       16
    width      60
    height     18
    fcolor     '00ffee'
    reload     1
    update     1000
}

Widget VRAM_pct {
    class      'Truetype'
    expression round(file::readline('/sys/class/drm/card1/device/mem_info_vram_used', 1) / file::readline('/sys/class/drm/card1/device/mem_info_vram_total', 1) * 100) . '%'
    font       '/usr/share/fonts/TTF/DejaVuSans-Bold.ttf'
    size       16
    width      60
    height     18
    fcolor     '00ffee'
    reload     1
    update     1000
}

Widget CPU_load_big {
    class      'Truetype'
    expression round(proc_stat::cpu('busy', 1)) . '%'
    font       '/usr/share/fonts/TTF/DejaVuSans-Bold.ttf'
    size       20
    width      80
    height     22
    fcolor     '00ffee'
    reload     1
    update     500
}

Widget GPU_load_big {
    class      'Truetype'
    expression file::readline('/sys/class/drm/card1/device/gpu_busy_percent', 1) . '%'
    font       '/usr/share/fonts/TTF/DejaVuSans-Bold.ttf'
    size       20
    width      80
    height     22
    fcolor     '00ffee'
    reload     1
    update     500
}




Layout Main {
    layer 3 {
        X1.Y1      'BG'
    }
    layer 1 {
        X5.Y5      'CPU_title'
        X28.Y5     'CPU_hist'
        X58.Y5     'GPU_title'
        X81.Y5     'GPU_hist'

        X9.Y100    'CPU_freq'
        X62.Y100   'GPU_freq'

        X145.Y5    'RAM_bar'
        X190.Y5    'VRAM_bar'

        X165.Y50   'RAM_free'
        X207.Y50   'VRAM_free'

    }
    layer 2 {
        X30.Y185   'CPU_load_big'
        X5.Y250    'CPU_temp'
        X80.Y185   'GPU_load_big'
        X60.Y250   'GPU_temp'
        X142.Y200  'RAM_pct'
        X192.Y200  'VRAM_pct'
    }
}


Layout MainGrouped {
    layer 3 {
        X1.Y1      'BG'
    }
    layer 1 {
        X8.Y5      'CPU_title'
        X8.Y100    'CPU_freq'
        X8.Y255    'CPU_temp'
        X28.Y5     'CPU_hist'
        X28.Y190   'CPU_load_big'
        X65.Y5     'RAM_bar'
        X65.Y190   'RAM_pct'
        X85.Y5     'RAM_free'

        X135.Y5    'GPU_title'
        X135.Y100  'GPU_freq'
        X135.Y255  'GPU_temp'
        X155.Y5    'GPU_hist'
        X155.Y190  'GPU_load_big'
        X187.Y5    'VRAM_bar'
        X187.Y190  'VRAM_pct'
        X207.Y5    'VRAM_free'
    }
}


Display 'dpf'
Layout 'MainGrouped'
